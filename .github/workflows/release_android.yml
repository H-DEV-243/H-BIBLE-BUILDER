name: Android Build & Release

on:
  workflow_dispatch: # Déclenchement manuel via PowerShell ou l'interface

jobs:
  build:
    name: Android Build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 🚀 ASPIRATION DU CODE PRIVÉ
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: 'H-DEV-243/H_BIBLE'
          token: ${{ secrets.GH_PRIVATE_TOKEN }}
          ref: 'main'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Get Version from Firestore
        id: get_version
        run: |
          npm install firebase-admin
          node scripts/get_version.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Python dependencies
        run: pip install --quiet sqlite3 2>/dev/null || true

      - name: Generate Binary Databases
        run: python scripts/compress_to_bin.py

      - name: Calculate Version Code
        id: calc_version_code
        run: echo "VERSION_CODE=$((20000 + ${{ github.run_number }}))" >> $GITHUB_OUTPUT

      - name: Build APK (Split Per ABI)
        run: |
          flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/native-debug-symbols --build-name=${{ steps.get_version.outputs.VERSION }} --build-number=${{ steps.calc_version_code.outputs.VERSION_CODE }} --android-skip-build-dependency-validation

      - name: Create GitHub Release (PRIVATE)
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/*.apk"
          tag: v${{ steps.get_version.outputs.VERSION }}
          name: Android Release ${{ steps.get_version.outputs.VERSION }}
          allowUpdates: true
          replacesArtifacts: true
          body: |
            ## Build Android Automatique (Source: Firestore)
            - Version : ${{ steps.get_version.outputs.VERSION }}
            - Architectures : arm64-v8a, armeabi-v7a, x86_64
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (PUBLIC MIRROR)
        uses: ncipollo/release-action@v1
        with:
          owner: H-DEV-243
          repo: H-BIBLE-APP
          artifacts: "build/app/outputs/flutter-apk/*.apk"
          tag: v${{ steps.get_version.outputs.VERSION }}
          name: H-Bible Release ${{ steps.get_version.outputs.VERSION }}
          allowUpdates: true
          replacesArtifacts: true
          body: |
            ## H-Bible Ultimate - Nouvelle Version Android 🚀
            - Version : ${{ steps.get_version.outputs.VERSION }}
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
